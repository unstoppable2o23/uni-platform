version: '3.8'
services:
  api:
    build: .
    ports:
      - "80:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: unidb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
